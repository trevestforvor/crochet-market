    - zh-CN
  license:
    - text: Gemma
  category: AI
  requiredMemory: 24Gi
  limitedMemory: 40Gi
  requiredCpu: 4100m
  limitedCpu: 16000m
  requiredGpu: 1Gi
  limitedGpu: 24Gi
  requiredDisk: 25Gi
  limitedDisk: 50Gi
  supportArch:
    - amd64
permission:
  appData: true
middleware: {}
options:
  apiTimeout: 0
