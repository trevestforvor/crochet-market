---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llamacpp-env
  namespace: "{{ .Release.Namespace }}"
data:
  MODEL_URL: "https://huggingface.co/unsloth/gemma-3-12b-it-GGUF/resolve/main/gemma-3-12b-it-Q8_0.gguf"
  MODEL_FILE: "gemma-3-12b-it-Q8_0.gguf"
  MODEL_ALIAS: "gemma-3-12b"
  CONTEXT_SIZE: "131072"
  N_GPU_LAYERS: "99"
  THREADS: "16"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: llamacppgemma312b
  name: llamacppgemma312b
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: llamacppgemma312b
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: llamacppgemma312b
    spec:
      initContainers:
        - name: model-downloader
          image: "docker.io/alpine:3.20"
          command:
            - sh
            - '-c'
            - |
              MODEL_PATH="/models/${MODEL_FILE}"
              if [ -f "$MODEL_PATH" ]; then
                echo "Model already downloaded: $MODEL_PATH"
                ls -lh "$MODEL_PATH"
              else
                echo "Downloading model from $MODEL_URL ..."
                wget -O "$MODEL_PATH.tmp" "$MODEL_URL"
                mv "$MODEL_PATH.tmp" "$MODEL_PATH"
                echo "Download complete."
                ls -lh "$MODEL_PATH"
              fi
          envFrom:
            - configMapRef:
                name: llamacpp-env
          resources:
            limits:
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - mountPath: "/models"
              name: models
      containers:
        - name: llamacpp-server
          image: "ghcr.io/ggml-org/llama.cpp:server-cuda13-b8369"
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--model"
            - "/models/$(MODEL_FILE)"
            - "--alias"
            - "$(MODEL_ALIAS)"
            - "--ctx-size"
            - "$(CONTEXT_SIZE)"
            - "--n-gpu-layers"
            - "$(N_GPU_LAYERS)"
            - "--threads"
            - "$(THREADS)"
            - "--cache-type-k"
            - "q8_0"
            - "--cache-type-v"
            - "q8_0"
          envFrom:
            - configMapRef:
                name: llamacpp-env
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 120
          resources:
            limits:
              cpu: "16"
              memory: "40Gi"
              nvidia.com/gpu: "1"
            requests:
              cpu: "4"
              memory: "24Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - mountPath: "/models"
              name: models
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
      restartPolicy: Always
status: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: llamacppgemma312b
  name: llamacppgemma312b
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "llamacpp"
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: llamacppgemma312b
status:
  loadBalancer: {}
