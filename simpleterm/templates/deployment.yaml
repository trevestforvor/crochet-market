---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simpleterm
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: simpleterm
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: simpleterm
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: simpleterm
    spec:
      containers:
        - name: code-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --auth
            - none
            - --bind-addr
            - "0.0.0.0:8080"
            - --disable-telemetry
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: HOME
              value: /home/coder
            - name: SHELL
              value: /bin/bash
            - name: TERM
              value: xterm-256color
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: app-data
              mountPath: /home/coder
      restartPolicy: Always
      volumes:
        - name: app-data
          hostPath:
            path: "{{ .Values.userspace.appData }}"
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: simpleterm
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: simpleterm
spec:
  type: ClusterIP
  selector:
    io.kompose.service: simpleterm
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
