---
apiVersion: v1
kind: Secret
metadata:
  name: obsidisync-secret
  namespace: "{{ .Release.Namespace }}"
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
data:
  {{- if (lookup "v1" "Secret" .Release.Namespace "obsidisync-secret") }}
  vault-token: {{ index (lookup "v1" "Secret" .Release.Namespace "obsidisync-secret").data "vault-token" }}
  {{- else }}
  vault-token: {{ randAlphaNum 44 | b64enc | quote }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: obsidisync-env
  namespace: "{{ .Release.Namespace }}"
data:
  VAULT_ROOT: "/srv/vault"
  LISTEN_ADDR: ":8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: obsidisync
  name: obsidisync
  namespace: "{{ .Release.Namespace }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: obsidisync
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: obsidisync
    spec:
      containers:
        - name: obsidisync
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: obsidisync-secret
                  key: vault-token
            - name: VAULT_ROOT
              valueFrom:
                configMapKeyRef:
                  name: obsidisync-env
                  key: VAULT_ROOT
            - name: LISTEN_ADDR
              valueFrom:
                configMapKeyRef:
                  name: obsidisync-env
                  key: LISTEN_ADDR
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "64Mi"
          volumeMounts:
            - mountPath: "/srv/vault"
              name: vaultdata
            - mountPath: "/var/lib/vault-bridge"
              name: appdata
            - mountPath: "/var/cache/vault-bridge"
              name: appcache
      volumes:
        - name: vaultdata
          hostPath:
            path: "{{ .Values.userspace.userData }}/Obsidian"
            type: DirectoryOrCreate
        - name: appdata
          hostPath:
            path: "{{ .Values.userspace.appData }}/obsidisync"
            type: DirectoryOrCreate
        - name: appcache
          hostPath:
            path: "{{ .Values.userspace.appCache }}/obsidisync"
            type: DirectoryOrCreate
      restartPolicy: Always
status: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: obsidisync
  name: obsidisync
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "webdav"
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: obsidisync
status:
  loadBalancer: {}
