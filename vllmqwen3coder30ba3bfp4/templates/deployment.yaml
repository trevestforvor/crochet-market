---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-env
  namespace: "{{ .Release.Namespace }}"
data:
  MODEL_NAME: "NVFP4/Qwen3-Coder-30B-A3B-Instruct-FP4"
  MODEL_ALIAS: "qwen3-coder-30b-a3b-fp4"
  MAX_MODEL_LEN: "16384"
  GPU_MEMORY_UTILIZATION: "0.95"
  MAX_NUM_SEQS: "8"
  MAX_NUM_BATCHED_TOKENS: "16384"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: vllmqwen3coder30ba3bfp4
  name: vllmqwen3coder30ba3bfp4
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: vllmqwen3coder30ba3bfp4
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: vllmqwen3coder30ba3bfp4
    spec:
      runtimeClassName: nvidia
      containers:
        - name: vllm-server
          image: "vllm/vllm-openai:cu130-nightly"
          command:
            - vllm
            - serve
          args:
            - "$(MODEL_NAME)"
            - "--served-model-name"
            - "$(MODEL_ALIAS)"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--max-model-len"
            - "$(MAX_MODEL_LEN)"
            - "--gpu-memory-utilization"
            - "$(GPU_MEMORY_UTILIZATION)"
            - "--max-num-seqs"
            - "$(MAX_NUM_SEQS)"
            - "--max-num-batched-tokens"
            - "$(MAX_NUM_BATCHED_TOKENS)"
            - "--dtype"
            - "auto"
            - "--trust-remote-code"
            - "--download-dir"
            - "/models"
            - "--enforce-eager"
            - "--cpu-offload-gb"
            - "2"
            - "--reasoning-parser"
            - "qwen3"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser"
            - "qwen3coder"
          env:
            - name: HF_HOME
              value: "/models/huggingface"
            - name: VLLM_ATTENTION_BACKEND
              value: "FLASH_ATTN"
          envFrom:
            - configMapRef:
                name: vllm-env
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 120
          resources:
            limits:
              cpu: "16"
              memory: "40Gi"
              nvidia.com/gpu: "1"
            requests:
              cpu: "4"
              memory: "24Gi"
          volumeMounts:
            - mountPath: "/models"
              name: models
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
      restartPolicy: Always
status: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: vllmqwen3coder30ba3bfp4
  name: vllmqwen3coder30ba3bfp4
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "vllm"
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: vllmqwen3coder30ba3bfp4
status:
  loadBalancer: {}
